career-profile:
    title: Profiel
    summary: |
      Senior Workspace & Cloud Consultant met ruim 15 jaar IT-ervaring. Mijn kernexpertise
      ligt in het Microsoft 365- en Azure-ecosysteem: Microsoft Intune en Windows modern
      management, Microsoft Entra ID (identity & access), Conditional Access & endpoint-
      security en Azure Virtual Desktop.

      Ik ontwerp, bouw en beheer moderne, cloud-first werkplekken voor complexe
      enterprise-organisaties — van device- en identity-management tot automatisering en
      security. Ik heb werkplekken neergezet voor organisaties van 850 tot 16.000+ devices
      en vertaal strategie naar oplossingen die ook na oplevering blijven werken.

      Met PRINCE2 Practitioner, ITIL en Scrum beweeg ik moeiteloos tussen project- en
      beheerorganisaties. Als verbindende schakel tussen techniek, architectuur en operatie
      lever ik niet alleen techniek op, maar ook overdracht, documentatie en een werkwijze
      die blijft staan.

