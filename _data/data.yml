experiences:
    title: Werkervaring
    info:
      - role: Werkplek Consultant
        time: apr 2026 - Present
        company: "'s Heeren Loo"
        details: |
          Doorontwikkeling van de digitale werkplek en tactisch bepalen van de roadmap
          voor team Werkplek & Applicaties.
          - Ontwerp en implementatie van een BYOD-werkplek op basis van Conditional Access
          - Inrichten van Microsoft Defender for Cloud Apps (MDCA) voor sessie- en gegevensbeheersing
          - Opschoning en optimalisatie van de Azure Virtual Desktop-omgeving (kosten & performance)
          - Beveiligen van toegang tot bedrijfsgegevens vanaf onbeheerde apparaten

      - role: Technical Consultant
        time: apr 2026 - Present
        company: Ecotone Wessanen
        details: |
          Vervolgopdracht: doorontwikkeling van de Intune-werkplek en oppakken van restpunten.
          - Migratie van 802.1x van on-premises NPS naar een cloudoplossing (RADIUS-as-a-Service / SCEPman)
          - Applicatieverbeteringen en optimalisatie van de werkplek-baseline in Microsoft Intune
          - Begeleiden van de Intune-pilot (migratie vanuit SCCM)

      - role: Technical Consultant
        time: sep 2024 - mrt 2026
        company: De Brauw Blackstone Westbroek
        details: |
          Verantwoordelijk voor beheer en doorontwikkeling van 1.000+ Windows-werkplekken
          (Surface) en 1.000 iPhones via Intune binnen een veeleisende juridische omgeving.
          - Uitrol van Azure Virtual Desktop voor personal- en multi-sessiegebruikers
          - Implementatie van een logsensor voor SIEM/SOC-oplossingen
          - Transitie van Azure ExpressRoute naar SD-WAN (Cisco Meraki, met Axians)
          - Piloting van Intune Cloud PKI voor Always-on-VPN en Windows 11-migratiepilot

      - role: Technical Project Consultant
        time: mei 2025
        company: Ecotone Wessanen
        details: |
          Ontwerp en oplevering van een volledig nieuwe Intune-werkplek volgens actuele
          Microsoft-standaarden en best practices.
          - Opgesteld functioneel en technisch ontwerp voor de nieuwe werkplek
          - Ontworpen device-, security- en configuratiestructuur voor moderne Windows-endpoints
          - Ontwerpkeuzes afgestemd met stakeholders en de implementatie begeleid tot oplevering

      - role: Technical Project Consultant
        time: jan 2025 - mrt 2025
        company: TAUW
        details: |
          Ondersteuning bij de migratie naar een moderne digitale werkplek binnen een
          lopend transformatietraject.
          - Bijgedragen aan afronding en uitrol van het moderne werkplekontwerp
          - Uitvoerende Intune-werkzaamheden: device- en configuratiebeheer
          - Uitfasering van regionale kantooromgevingen en oplossen van operationele issues

      - role: Technical Project Consultant
        time: dec 2024 - jan 2025
        company: Scholengroep Leonardo da Vinci
        details: |
          Inventarisatie en ontwerp van een kiosk- en gedeelde werkplekoplossing binnen
          een onderwijsomgeving.
          - Functionele en technische eisen en gebruikersscenario's in kaart gebracht
          - Kiosk-concept ontworpen op basis van Intune en Windows modern management
          - Geadviseerd over beheerbaarheid, beveiliging en gebruikerservaring

      - role: Modern Workspace Consultant
        time: aug 2023 - jun 2024
        company: Nederlandse Spoorwegen
        details: |
          Grootschalige MDM-migratie van ±16.000 Android-devices van VMware Airwatch naar
          Microsoft Intune.
          - Ontworpen Intune-omgeving met Samsung Knox (Enrollment / Intelligence / E-FOTA)
          - Ontwikkeld werkplek met Samsung DeX, shared tablets en specialistische Android-devices
          - Floorwalkers getraind en migratie aangestuurd op piekdagen van 300–400 devices

      - role: Lead Engineer – Modern Workplace
        time: jan 2019 - feb 2023
        company: PWN | Puur Water & Natuur
        details: |
          Lead engineer voor de ontwikkeling en implementatie van de digitale werkplek
          (2.000 accounts, 850 Windows-, 350 iOS- en 400 Android-devices).
          - Development Azure Virtual Desktop en Windows 365 CloudPC
          - MDM Windows 10 en iOS/Android (zero-touch enrollment, compliance & configuration)
          - Applicatie-packaging (Win32App) via PowerShell en Azure DevOps CI/CD-pipelines
          - Conditional Access & Microsoft Endpoint Security

      - role: Senior Workspace Consultant
        time: 2018 - 2023
        company: Dignitas
        details: |
          Diverse ontwerptrajecten voor nieuwe werkplekken op basis van Intune, Azure AD,
          Windows 10, Liquit Workspace en RDS.
          - Lead consultant voor opbouw van een Citrix (Cloud)-gebaseerde mobiele werkplek
          - Opbouw two-tier Microsoft PKI en ADFS-omgeving
          - Volledige netwerk- en backendvernieuwing (VMware vSphere, Windows Server 2016)

      - role: Projectmanager
        time: aug 2018 - dec 2018
        company: Tweede Kamer der Staten-Generaal
        details: |
          Succesvolle implementatie van Xerox XMPie (Web-To-Print). PRINCE2-projectmanagement
          met 25+ stakeholders in een politiek gevoelige omgeving — afgerond binnen scope,
          budget en planning.

      - role: Teamlead Werkplekmigratie
        time: mei 2014 - nov 2016
        company: Gemeente Amsterdam
        details: |
          Teamlead frontend package team (±6 fte) voor de migratie naar de Amsterdamse
          Digitale Werkplek (ADW). Migratie van applicaties en werkplekken over
          7 stadsonderdelen (5.000+ werkplekken).

